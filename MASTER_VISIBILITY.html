<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROADTEX — Master Dashboard · ING-3 &amp; ING-4</title>
<style>
  :root{
    --navy:#1B2B4B; --navy-2:#15223d; --ink:#0a1120; --panel:#13203a; --panel-2:#182a4a;
    --line:#26385c; --line-soft:#1e2e4d; --red:#CC1F26; --txt:#eef3fc; --dim:#9fb0cf; --mute:#5f719a;
    --green:#22c55e; --amber:#f59e0b; --rose:#ef4444; --cyan:#38bdf8; --violet:#a78bfa; --teal:#2dd4bf;
    --r:16px; --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:
    radial-gradient(1200px 600px at 12% -8%, #1b2d52 0%, transparent 55%),
    radial-gradient(1100px 700px at 100% 0%, #20131f 0%, transparent 50%),
    var(--ink);
    color:var(--txt);font-family:var(--sans);min-height:100%;
    font-feature-settings:"tnum" 1}
  .mono{font-family:var(--mono)}

  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:14px 24px;background:linear-gradient(180deg,rgba(10,17,32,.96),rgba(10,17,32,.8));
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:13px}
  .brand img{height:40px;border-radius:7px;background:#fff;padding:3px 7px}
  .brand h1{font-size:16px;font-weight:800;letter-spacing:.3px;line-height:1.1}
  .brand .sub{font-size:10.5px;color:var(--dim);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px}
  .hspace{flex:1}
  .conns{display:flex;gap:9px;flex-wrap:wrap}
  .conn{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);
    background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mute)}
  .dot.on{background:var(--green);animation:pulse 2.4s infinite}
  .dot.off{background:var(--rose)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .clock{font-family:var(--mono);text-align:right;line-height:1.15}
  .clock .t{font-size:21px;font-weight:700}
  .clock .d{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.4px}
  .tvbtn{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:var(--dim);
    background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-family:var(--sans);transition:.15s}
  .tvbtn:hover{color:var(--txt);border-color:var(--red);background:var(--panel-2)}
  .tvbtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}

  .wrap{max-width:100%;margin:0 auto;padding:22px 30px 40px}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:1fr}}
  .kpi{position:relative;background:linear-gradient(160deg,var(--panel),var(--navy-2));
    border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;overflow:hidden;
    box-shadow:0 14px 30px rgba(0,0,0,.3)}
  .kpi .ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:19px;margin-bottom:13px}
  .kpi .lab{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1.4px}
  .kpi .val{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1.05;margin-top:3px}
  .kpi .foot{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:11px}
  .kpi .kbar{height:5px;border-radius:4px;background:#0d1830;overflow:hidden;margin:14px 0 0}
  .kpi .kbar i{display:block;height:100%;border-radius:4px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .pill{font-family:var(--mono);font-weight:700;font-size:10.5px;padding:2px 7px;border-radius:20px}
  .pill.up{color:#7ee2a0;background:rgba(34,197,94,.13)}
  .pill.down{color:#ff9396;background:rgba(239,68,68,.13)}
  .pill.flat{color:var(--mute);background:rgba(255,255,255,.05)}
  .kpi .ph{color:var(--mute);font-size:11px}

  /* card grid */
  .grid{display:grid;gap:16px}
  .row-2{grid-template-columns:1.55fr 1fr}
  .row-2b{grid-template-columns:1fr 1fr}
  @media(max-width:1100px){.row-2,.row-2b{grid-template-columns:1fr}}
  .card{background:linear-gradient(160deg,var(--panel),var(--navy-2));border:1px solid var(--line);
    border-radius:var(--r);padding:18px 20px;box-shadow:0 14px 30px rgba(0,0,0,.28)}
  .card.mb{margin-bottom:16px}
  .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .ch h3{font-size:14px;font-weight:700}
  .ch .hint{font-size:10.5px;color:var(--mute);text-transform:uppercase;letter-spacing:1.2px}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--dim);margin:2px 0 8px}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle}
  svg.chart{width:100%;display:block;overflow:visible}

  /* rings */
  .ringn{position:relative;width:140px;height:140px;margin:0 auto}
  .ringn svg{width:100%;height:100%;display:block}
  .ringn .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ringn .c b{font-family:var(--mono);font-size:27px;font-weight:700;display:flex;align-items:baseline}
  .ringn .c b i{font-size:.5em;font-style:normal;margin-left:1px;opacity:.8}
  .ringn .c s{font-size:8.5px;color:var(--dim);text-decoration:none;letter-spacing:1.5px;margin-top:3px}
  .ringn.sm{width:108px;height:108px}
  .ringn.sm .c b{font-size:20px}
  .ringn.sm .c s{font-size:7px;letter-spacing:1px;margin-top:2px}
  /* horizontal bars (pickers) */
  .hbar{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .hbar .rk{width:22px;height:22px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;font-size:11px;background:#26314e;color:var(--dim)}
  .hbar .rk.g1{background:#3a2f06;color:#ffd24a} .hbar .rk.g2{background:#2a2f38;color:#cdd7e6} .hbar .rk.g3{background:#33220f;color:#e8a060}
  .hbar .nm{width:84px;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar .tr{flex:1;height:18px;background:#0a1426;border:1px solid var(--line-soft);border-radius:6px;overflow:hidden}
  .hbar .tr i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#cc1f26,#ff5a60)}
  .hbar .vv{width:62px;text-align:right;font-family:var(--mono);font-weight:700;font-size:12.5px}
  .hbar .vv s{display:block;font-size:8.5px;color:var(--mute);text-decoration:none}
  .tag-bldg{font-family:var(--mono);font-size:9.5px;padding:1px 6px;border-radius:5px;margin-left:7px;font-weight:700}
  .tag-3{background:rgba(34,197,94,.14);color:#7ee2a0} .tag-4{background:rgba(56,189,248,.14);color:#7fd4f5}

  /* minimalist stat bars */
  .bblock{margin-bottom:20px} .bblock:last-child{margin-bottom:0}
  .bblock-h{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .bblock-h .pip{width:6px;height:13px;border-radius:2px}
  .statrow{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .stat-l{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--mute);margin-bottom:8px}
  .stat-v{font-family:var(--mono);font-size:35px;font-weight:700;line-height:1;letter-spacing:-.5px}
  .stat-bar{height:5px;border-radius:4px;background:#0d1830;overflow:hidden;margin:14px 0 8px}
  .stat-bar i{display:block;height:100%;border-radius:4px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .stat-sub{font-family:var(--mono);font-size:11px;color:var(--mute)}
  .gnone{color:var(--mute);font-size:12px;padding:2px 0 8px}

  /* ops strip */
  .ops3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media(max-width:760px){.ops3{grid-template-columns:1fr}}
  .opc{background:#0d1830;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .opc h4{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .opc h4 .ic{width:7px;height:7px;border-radius:50%;background:var(--cyan)}
  .opl{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px dashed #1c2c49}
  .opl:last-child{border-bottom:0}
  .opl .l{font-size:12px;color:var(--dim)} .opl .v{font-family:var(--mono);font-weight:700;font-size:15px}
  .opd{font-size:10px;color:var(--mute);margin-top:9px;font-family:var(--mono)}

  .empty{padding:22px;text-align:center;color:var(--mute);font-size:12.5px;background:#0d1830;
    border:1px dashed var(--line);border-radius:12px;line-height:1.5}
  .empty b{color:var(--dim)}
  .sec-title{display:flex;align-items:center;gap:10px;margin:24px 0 12px;font-size:12px;letter-spacing:2.5px;
    text-transform:uppercase;color:var(--dim)}
  .sec-title .pip{width:6px;height:15px;border-radius:2px;background:var(--cyan)}
  .sec-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  footer{max-width:100%;margin:0 auto;padding:6px 30px 30px;color:var(--mute);font-size:11px;display:flex;gap:16px;flex-wrap:wrap}
  footer a{color:var(--dim);text-decoration:none;border-bottom:1px dotted var(--line)}
  .ro{margin-left:auto;text-transform:uppercase;letter-spacing:1.4px;font-size:10px}

  /* TV mode */
  body.tv{overflow:hidden}
  body.tv .tvbtn{display:none}
  body.tv footer{display:none}
  body.tv .wrap{max-width:100%}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, query, orderByKey, limitToLast }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ===== read-only consolidation of roadtex-dock + roadtex-operations ===== */
const DOCK_CFG={apiKey:"AIzaSyCePIwyZdkyDCuovx2N1F-GbE35f9IYsVo",authDomain:"roadtex-dock.firebaseapp.com",databaseURL:"https://roadtex-dock-default-rtdb.firebaseio.com",projectId:"roadtex-dock",storageBucket:"roadtex-dock.firebasestorage.app",messagingSenderId:"468266334524",appId:"1:468266334524:web:506cb05e526cb80bf28639"};
const OPS_CFG={apiKey:"AIzaSyBzYU-LmrLemJVYsyLoUoUhpiqPMrHdlDo",authDomain:"roadtex-operations.firebaseapp.com",databaseURL:"https://roadtex-operations-default-rtdb.firebaseio.com",projectId:"roadtex-operations",storageBucket:"roadtex-operations.firebasestorage.app",messagingSenderId:"856738009226",appId:"1:856738009226:web:fae2cb66c4da1dcf449d73"};
const dockDb=getDatabase(initializeApp(DOCK_CFG,'dock'));
const opsDb =getDatabase(initializeApp(OPS_CFG,'ops'));

/* ---- location maps (mirror of source panels) ---- */
const p2=n=>String(n).padStart(2,'0'), p3=n=>String(n).padStart(3,'0');
function buildING3(){const L={};
  for(let i=1;i<=14;i++)L['SL'+p2(i)]={type:'SL',cap:4};
  for(let i=17;i<=39;i++)L['SL'+p2(i)]={type:'SL',cap:5};
  for(let i=40;i<=44;i++)L['SL'+p2(i)]={type:'SL',cap:4};
  for(let i=45;i<=69;i++)L['SL'+p2(i)]={type:'SL',cap:5};
  for(let i=1;i<=17;i++)L['CPU'+p3(i)]={type:'CPU',cap:5};
  for(let i=18;i<=24;i++)L['CPU'+p3(i)]={type:'CPU',cap:2};
  for(let i=25;i<=27;i++)L['CPU'+p3(i)]={type:'CPU',cap:4};
  for(let i=28;i<=43;i++)L['CPU'+p3(i)]={type:'CPU',cap:5};
  for(let i=1;i<=8;i++)L['OVF'+p2(i)]={type:'OVF',cap:30};return L;}
function buildING4(){const L={};
  for(let i=1;i<=10;i++)L['RTA-'+p3(i)]={type:'RTA',cap:9};
  const sm=[23,29,33,42,49];
  for(let i=1;i<=49;i++)L['CPU-'+p3(i)]={type:'CPU',cap:sm.includes(i)?7:9};
  for(let i=1;i<=12;i++)L['OVF-'+p2(i)]={type:'OVF',cap:30};return L;}
const BLD={'ING-3':{td:507,build:buildING3,paths:{dock:'dock',goal:'goal',rel:'releasedOrders',hist:'history'},hasOps:true,color:'var(--green)'},
           'ING-4':{td:521,build:buildING4,paths:{dock:'ing4_dock',goal:'ing4_goal',rel:'ing4_releasedOrders',hist:'ing4_history'},hasOps:false,color:'var(--cyan)'}};
const S={'ING-3':{orders:[],goal:{},released:[],hist:{},ops:null},'ING-4':{orders:[],goal:{},released:[],hist:{},ops:null}};

/* ---- dock math ---- */
function rebuildLoc(L,orders){Object.keys(L).forEach(k=>{L[k].uS=0;L[k].uD=0;});
  orders.forEach(o=>{const locs=o.locs||[o.loc];
    let sQ=o.singleQty!==undefined?o.singleQty:(o.palletType==='double'?0:o.pallets);
    let dQ=o.doubleQty!==undefined?o.doubleQty:(o.palletType==='double'?o.pallets:0);
    for(let i=0;i<locs.length;i++){const l=L[locs[i]];if(!l)continue;
      const a1=l.cap-(l.uS+l.uD),pS=Math.min(sQ,a1);l.uS+=pS;sQ-=pS;
      const a2=l.cap-(l.uS+l.uD),pD=Math.min(dQ,a2);l.uD+=pD;dQ-=pD;}});}
function pickerStats(orders,released){const s={};
  const add=arr=>arr.forEach(o=>{const pk=(o.pickers&&o.pickers.length)?o.pickers:[o.picker||'?'];
    const bpp=pk.length?Math.round((o.boxes||0)/pk.length):0;
    pk.forEach(n=>{n=(n||'').trim();if(!n)return;if(!s[n])s[n]={boxes:0,ord:new Set()};s[n].boxes+=bpp;s[n].ord.add(o.order);});});
  add(orders.filter(o=>!o.carryOver));add(released);
  return Object.entries(s).map(([n,v])=>({name:n,boxes:v.boxes,orders:v.ord.size})).filter(p=>p.boxes>0||p.orders>0).sort((a,b)=>b.boxes-a.boxes);}
function dockSummary(key){const b=BLD[key],st=S[key],L=b.build();rebuildLoc(L,st.orders);
  let dockOcc=0,ovfOcc=0;Object.values(L).forEach(l=>{const u=l.uS+l.uD;if(l.type==='OVF')ovfOcc+=u;else dockOcc+=u;});
  let boxes=0;const uniq=new Set();let completed=0;
  st.orders.forEach(o=>{if(o.completed)completed++;if(o.carryOver)return;boxes+=(o.boxes||0);uniq.add(o.order);});
  (st.released||[]).forEach(o=>{boxes+=(o.boxes||0);uniq.add(o.order);});
  const ordersTotal=st.orders.filter(o=>!o.carryOver).length;
  return{td:b.td,dockOcc,ovfOcc,avail:b.td-dockOcc,pct:b.td>0?Math.round((dockOcc/b.td)*100):0,
    boxes,uniqOrders:uniq.size,ordersTotal,completed,active:ordersTotal-completed,
    pickers:pickerStats(st.orders,st.released),goal:st.goal||{}};}

/* ---- ops derive ---- */
function mins(a,b){if(!a||!b)return 0;const[h1,m1]=a.split(':').map(Number),[h2,m2]=b.split(':').map(Number);let d=(h2*60+m2)-(h1*60+m1);if(d<0)d+=1440;return d;}
function effOps(d){const out=(d.transfers||[]).filter(t=>t.direction==='out'&&!t.sourceArea).reduce((s,t)=>s+(t.operators||0),0);
  if(d.ppl!==null&&d.ppl!==undefined&&d.ppl!=='')return Number(d.ppl);return Math.max(0,(d.ops||0)-(d.absent||0)-out);}
function loanIn(d){return(d.transfers||[]).reduce((s,t)=>s+(t.direction==='in'?(mins(t.from||d.start,t.to||d.end)/60)*(t.operators||1):0),0);}
function deriveIB(d){if(!d)return null;const tot=Math.max(0,mins(d.start,d.end)-30),e=effOps(d),lab=e*(tot/60)+loanIn(d);
  return{cartons:d.cartons||0,pos:d.pos||0,ppl:e,laborHrs:lab,cph:lab>0?(d.cartons||0)/lab:0};}
function deriveOB(d){if(!d)return null;const hrs=Math.max(0,mins(d.start,d.end)/60-0.5),e=effOps(d),lab=e*hrs+loanIn(d);
  return{orders:d.orders||0,cartonsPicked:d.cartonsPicked||0,wrapped:d.wrapped||0,ppl:e,laborHrs:lab,cph:lab>0?(d.cartonsPicked||0)/lab:0};}
function deriveINV(d){if(!d)return null;const c=Math.max(0,(d.counted||0)-(d.discrepancies||0));
  return{counted:d.counted||0,discrepancies:d.discrepancies||0,accuracy:d.counted>0?(c/d.counted)*100:0,capacity:d.capacity||0};}

/* ===== SVG chart helpers ===== */
const fmt=n=>(Math.round(n||0)).toLocaleString('en-US');
const r1=n=>(Math.round((n||0)*10)/10).toFixed(1);
function niceMax(v){if(v<=0)return 10;const p=Math.pow(10,Math.floor(Math.log10(v)));const f=v/p;const n=f<=1?1:f<=2?2:f<=5?5:10;return n*p;}
function mmdd(k){const p=(k||'').split('-');return p.length===3?p[1]+'/'+p[2]:k;}

// trend series from history of a building: returns [{date,boxes,orders,pct}] last N + today(live)
function trend(key,n){
  const h=S[key].hist||{}; const keys=Object.keys(h).sort();
  const arr=keys.slice(-n).map(k=>({date:k,boxes:(h[k].kpis&&h[k].kpis.boxes)||0,orders:(h[k].kpis&&h[k].kpis.orders)||0,pct:(h[k].kpis&&h[k].kpis.pctOccupancy)||0,pickers:(h[k].kpis&&h[k].kpis.pickers)||0}));
  const live=dockSummary(key);
  arr.push({date:'TODAY',boxes:live.boxes,orders:live.uniqOrders,pct:live.pct,pickers:live.pickers.length,live:true});
  return arr;
}
function unionDates(a,b){const s=new Set([...a.map(x=>x.date),...b.map(x=>x.date)]);return[...s];}

function sparkline(vals,color,w=170,h=46){
  if(!vals.length)return'';const max=Math.max(...vals,1),min=Math.min(...vals,0),rng=(max-min)||1;
  const step=w/Math.max(1,vals.length-1);
  const pts=vals.map((v,i)=>[i*step,h-4-((v-min)/rng)*(h-10)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${w} ${h} L 0 ${h} Z`;
  const id='sp'+Math.random().toString(36).slice(2,7);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function areaChart(dates, s1, s2, c1, c2, w=720, h=240){
  const pad={l:42,r:14,t:14,b:26};const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const all=[...s1,...s2,1];const max=niceMax(Math.max(...all));
  const n=dates.length;const xs=i=>pad.l+(n<=1?iw/2:(i*iw/(n-1)));
  const ys=v=>pad.t+ih-(v/max)*ih;
  const grid=[0,.25,.5,.75,1].map(f=>{const y=pad.t+ih-f*ih;return `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#1f2e4d" stroke-width="1"/><text x="${pad.l-8}" y="${y+3}" text-anchor="end" font-size="9" fill="#5f719a" font-family="monospace">${fmt(max*f)}</text>`;}).join('');
  function pathFor(arr,col,id){
    const line=arr.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(v).toFixed(1)).join(' ');
    const area=line+` L ${xs(n-1).toFixed(1)} ${pad.t+ih} L ${xs(0).toFixed(1)} ${pad.t+ih} Z`;
    const dots=arr.map((v,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(v).toFixed(1)}" r="2.6" fill="${col}"/>`).join('');
    return `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>${dots}`;
  }
  const lbl=dates.map((d,i)=>(n>10&&i%2)?'':`<text x="${xs(i).toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="9" fill="#5f719a" font-family="monospace">${d==='TODAY'?'TODAY':mmdd(d)}</text>`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${grid}${pathFor(s1,c1,'a1')}${pathFor(s2,c2,'a2')}${lbl}</svg>`;
}

function groupedBars(dates, s1, s2, c1, c2, w=720, h=240){
  const pad={l:42,r:14,t:14,b:26};const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const max=niceMax(Math.max(...s1,...s2,1));const n=dates.length;
  const slot=iw/n;const bw=Math.min(16,slot/2.6);const gap=3;
  const ys=v=>pad.t+ih-(v/max)*ih;
  const grid=[0,.5,1].map(f=>{const y=pad.t+ih-f*ih;return `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#1f2e4d"/><text x="${pad.l-8}" y="${y+3}" text-anchor="end" font-size="9" fill="#5f719a" font-family="monospace">${fmt(max*f)}</text>`;}).join('');
  let bars='';
  dates.forEach((d,i)=>{const cx=pad.l+slot*i+slot/2;
    const h1=(s1[i]/max)*ih,h2=(s2[i]/max)*ih;
    bars+=`<rect x="${(cx-bw-gap/2).toFixed(1)}" y="${ys(s1[i]).toFixed(1)}" width="${bw}" height="${Math.max(0,h1).toFixed(1)}" rx="2.5" fill="${c1}"/>`;
    bars+=`<rect x="${(cx+gap/2).toFixed(1)}" y="${ys(s2[i]).toFixed(1)}" width="${bw}" height="${Math.max(0,h2).toFixed(1)}" rx="2.5" fill="${c2}"/>`;
    if(!(n>10&&i%2))bars+=`<text x="${cx.toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="9" fill="#5f719a" font-family="monospace">${d==='TODAY'?'TODAY':mmdd(d)}</text>`;});
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${grid}${bars}</svg>`;
}

function donut(pct, col, label='OCCUPIED', cls=''){
  const r=58,c=2*Math.PI*r,off=c*(1-Math.min(100,pct)/100);
  return `<div class="ringn ${cls}"><svg viewBox="0 0 140 140" style="transform:rotate(-90deg)">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="#0a1426" stroke-width="13"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="${col}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
   </svg><div class="c"><b style="color:${col}">${pct}<i>%</i></b><s>${label}</s></div></div>`;
}

/* ===== render ===== */
const wrap=document.getElementById('wrap');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function deltaPill(cur,prev){if(prev===undefined||prev===null||prev===0)return'<span class="pill flat">—</span>';
  const p=Math.round(((cur-prev)/prev)*100);if(p>0)return `<span class="pill up">▲ ${p}%</span>`;if(p<0)return `<span class="pill down">▼ ${Math.abs(p)}%</span>`;return '<span class="pill flat">=</span>';}

function kpiCard(ico,bg,col,lab,val,barPct,barCol,foot){
  const w=Math.min(100,Math.max(0,barPct));
  return `<div class="kpi">
    <div class="ico" style="background:${bg};color:${col}">${ico}</div>
    <div class="lab">${lab}</div><div class="val">${val}</div>
    <div class="foot">${foot}</div>
    <div class="kbar"><i style="width:${w}%;background:${barCol}"></i></div>
  </div>`;
}

function kpiRowFor(key){
  const d=dockSummary(key);
  const t=trend(key,13);
  const sBoxes=t.map(x=>x.boxes), sOrd=t.map(x=>x.orders);
  const maxB=Math.max(...sBoxes,1), maxO=Math.max(...sOrd,1);
  const prevBoxes=t.length>1?t[t.length-2].boxes:0;
  const prevOrders=t.length>1?t[t.length-2].orders:0;
  const color=BLD[key].color;
  const barBoxes=Math.round(d.boxes/maxB*100), barOrd=Math.round(d.uniqOrders/maxO*100);
  return `<div class="sec-title" style="margin-top:8px"><span class="pip" style="background:${color}"></span>${key} — ${key==='ING-3'?'Building 3':'Building 4'}</div>
  <div class="kpis">
    ${kpiCard('📦','rgba(204,31,38,.16)','#ff6b70','Boxes Today',fmt(d.boxes),barBoxes,'#ff5a60',
      `${deltaPill(d.boxes,prevBoxes)}<span class="ph">vs prev day</span>`)}
    ${kpiCard('🧾','rgba(56,189,248,.16)','#7fd4f5','Orders Today',fmt(d.uniqOrders),barOrd,'#38bdf8',
      `${deltaPill(d.uniqOrders,prevOrders)}<span class="ph">vs prev day</span>`)}
    ${kpiCard('🅿️','rgba(245,158,11,.16)','#fbbf24','Dock Occupancy',d.pct+'%',d.pct,capCol(d.pct),
      `<span class="ph">${fmt(d.dockOcc)} / ${fmt(d.td)} · ovf ${fmt(d.ovfOcc)}</span>`)}
  </div>`;
}

function networkPickers(){
  const s={};
  ['ING-3','ING-4'].forEach(key=>{dockSummary(key).pickers.forEach(p=>{
    const k=p.name;if(!s[k])s[k]={name:p.name,boxes:0,orders:0,b:key};s[k].boxes+=p.boxes;s[k].orders+=p.orders;});});
  return Object.values(s).sort((a,b)=>b.boxes-a.boxes).slice(0,6);
}

function opcEmpty(t){return `<div class="opc"><h4><span class="ic"></span>${t}</h4><div style="color:var(--mute);font-size:12px;padding:8px 0">No shift recorded</div></div>`;}
function goalPct(cur,tgt){return tgt>0?Math.min(100,Math.round(cur/tgt*100)):0;}
const _C={green:'#22c55e',greenL:'#4ade80',amber:'#f59e0b',red:'#ff5a60',mute:'#5f719a'};
function goalCol(p){return p>=100?_C.green:p>=80?_C.greenL:p>=50?_C.amber:_C.red;}
function capCol(p){return p>=90?_C.red:p>=70?_C.amber:_C.green;}
function invCol(a){return a>=98?_C.green:a>=95?_C.amber:_C.red;}
function statBar(label,big,pctBar,sub,col){
  const w=Math.min(100,Math.max(0,pctBar));
  return `<div class="stat"><div class="stat-l">${label}</div><div class="stat-v" style="color:${col}">${big}</div>
    <div class="stat-bar"><i style="width:${w}%;background:${col}"></i></div><div class="stat-sub">${sub}</div></div>`;
}
function goalBlockFor(key){
  const d=dockSummary(key),g=d.goal||{},color=BLD[key].color;
  const head=`<div class="bblock-h"><span class="pip" style="background:${color}"></span>${key}</div>`;
  const has=(g.targetBoxes>0||g.targetOrders>0);
  if(!has) return `<div class="bblock">${head}<div class="gnone">No goal set for today.</div></div>`;
  const items=[];
  if(g.targetBoxes>0){const p=goalPct(d.boxes,g.targetBoxes);items.push(statBar('Boxes',p+'%',p,`${fmt(d.boxes)} / ${fmt(g.targetBoxes)}`,goalCol(p)));}
  if(g.targetOrders>0){const p=goalPct(d.uniqOrders,g.targetOrders);items.push(statBar('Orders',p+'%',p,`${fmt(d.uniqOrders)} / ${fmt(g.targetOrders)}`,goalCol(p)));}
  return `<div class="bblock">${head}<div class="statrow">${items.join('')}</div></div>`;
}
function opsStripFor(key){
  const color=BLD[key].color;
  const head=`<div class="sec-title"><span class="pip" style="background:${color}"></span>${key} Operations · IB / OB / INV</div>`;
  const o=S[key].ops;
  if(!o) return head+`<div class="card mb"><div class="empty">Loading operations…</div></div>`;
  const ib=o.ib,ibP=o.ibPrev,ob=o.ob,obP=o.obPrev,inv=o.inv;
  const noData=!ib&&!ob&&!inv;
  if(noData) return head+`<div class="card mb"><div class="empty">No operations data yet for ${key}.<br><span>Shifts entered in the ${key} operations dashboard will appear here.</span></div></div>`;
  const ibc=ib?`<div class="opc"><h4><span class="ic"></span>Inbound</h4>
    ${ib.pos>0?`<div class="opl"><span class="l">POs received</span><span class="v">${fmt(ib.pos)}</span></div>`:''}
    <div class="opl"><span class="l">Cartons received</span><span class="v">${fmt(ib.cartons)}</span></div>
    <div class="opl"><span class="l">PPL · Cartons/h</span><span class="v">${fmt(ib.ppl)} · ${r1(ib.cph)}</span></div>
    <div class="opd">${deltaPill(ib.cartons,ibP&&ibP.cartons)} cartons vs prev · ${o.ibDate||''}</div></div>`:opcEmpty('Inbound');
  const obc=ob?`<div class="opc"><h4><span class="ic"></span>Outbound</h4>
    <div class="opl"><span class="l">Orders</span><span class="v">${fmt(ob.orders)}</span></div>
    <div class="opl"><span class="l">Cartons picked</span><span class="v">${fmt(ob.cartonsPicked)}</span></div>
    <div class="opl"><span class="l">PPL · Cartons/h</span><span class="v">${fmt(ob.ppl)} · ${r1(ob.cph)}</span></div>
    <div class="opd">${deltaPill(ob.cartonsPicked,obP&&obP.cartonsPicked)} cartons vs prev · ${o.obDate||''}</div></div>`:opcEmpty('Outbound');
  const ivc=inv?`<div class="opc"><h4><span class="ic"></span>Inventory</h4>
    <div class="opl"><span class="l">Counts</span><span class="v">${fmt(inv.counted)}</span></div>
    <div class="opl"><span class="l">Discrepancies</span><span class="v">${fmt(inv.discrepancies)}</span></div>
    <div class="opl"><span class="l">Accuracy</span><span class="v" style="color:${inv.accuracy>=98?'var(--green)':inv.accuracy>=95?'var(--amber)':'var(--rose)'}">${r1(inv.accuracy)}%</span></div>
    <div class="opd">${o.invDate||''}</div></div>`:opcEmpty('Inventory');
  return head+`<div class="card mb"><div class="ops3">${ibc}${obc}${ivc}</div></div>`;
}

function render(){
  const d3=dockSummary('ING-3'),d4=dockSummary('ING-4');
  const t3=trend('ING-3',13),t4=trend('ING-4',13);
  const dates=unionDates(t3,t4).sort((a,b)=>a==='TODAY'?1:b==='TODAY'?-1:a.localeCompare(b));
  const m3=Object.fromEntries(t3.map(x=>[x.date,x])),m4=Object.fromEntries(t4.map(x=>[x.date,x]));
  const boxes3=dates.map(k=>m3[k]?m3[k].boxes:0),boxes4=dates.map(k=>m4[k]?m4[k].boxes:0);
  const ord3=dates.map(k=>m3[k]?m3[k].orders:0),ord4=dates.map(k=>m4[k]?m4[k].orders:0);

  // KPI rows — separated by building
  const kpis = kpiRowFor('ING-3') + kpiRowFor('ING-4');

  // charts row 1: boxes trend + occupancy donuts
  const trendCard=`<div class="card">
    <div class="ch"><h3>Boxes — 14-Day Trend</h3><span class="hint">per building</span></div>
    <div class="legend"><span><i style="background:#22c55e"></i>ING-3</span><span><i style="background:#38bdf8"></i>ING-4</span></div>
    ${areaChart(dates,boxes3,boxes4,'#22c55e','#38bdf8')}
  </div>`;
  const bSnap=(key,col)=>{
    const inv=S[key].ops&&S[key].ops.inv; const acc=inv?Math.round(inv.accuracy):0;
    const ivb=statBar('Inventory',inv?acc+'%':'—',inv?acc:0,inv?`${fmt(inv.counted)} cnt · ${fmt(inv.discrepancies)} disc`:'No count today',inv?invCol(acc):_C.mute);
    const hasCap=inv&&inv.capacity>0;
    const capb=statBar('Building Capacity',hasCap?r1(inv.capacity)+'%':'—',hasCap?inv.capacity:0,hasCap?'building utilization':'No report today',hasCap?capCol(inv.capacity):_C.mute);
    return `<div class="bblock"><div class="bblock-h"><span class="pip" style="background:${col}"></span>${key}</div><div class="statrow">${ivb}${capb}</div></div>`;
  };
  const occCard=`<div class="card">
    <div class="ch"><h3>Inventory &amp; Capacity</h3><span class="hint">latest count</span></div>
    <div style="margin-top:6px">${bSnap('ING-3','#22c55e')}${bSnap('ING-4','#38bdf8')}</div></div>`;

  // charts row 2: orders by day + pickers
  const ordCard=`<div class="card">
    <div class="ch"><h3>Orders by Day</h3><span class="hint">per building</span></div>
    <div class="legend"><span><i style="background:#22c55e"></i>ING-3</span><span><i style="background:#38bdf8"></i>ING-4</span></div>
    ${groupedBars(dates,ord3,ord4,'#22c55e','#38bdf8')}
  </div>`;
  const goalCard=`<div class="card">
    <div class="ch"><h3>🎯 Daily Goal</h3><span class="hint">progress today</span></div>
    <div style="margin-top:10px">${goalBlockFor('ING-3')}${goalBlockFor('ING-4')}</div>
  </div>`;

  // ops — both buildings
  const opsSection = opsStripFor('ING-3') + opsStripFor('ING-4');

  wrap.innerHTML = kpis
    + `<div class="grid row-2 mb">${trendCard}${occCard}</div>`
    + `<div class="grid row-2b mb">${ordCard}${goalCard}</div>`
    + opsSection;

  document.getElementById('lastUpd').textContent='Last update '+new Date().toLocaleTimeString('en-US',{hour12:false});
  fitTV();
}
let dirty=false;
function scheduleRender(){if(dirty)return;dirty=true;requestAnimationFrame(()=>{dirty=false;render();});}

/* fit to screen on TV */
function fitTV(){const tv=document.body.classList.contains('tv');
  if(!tv){wrap.style.transform='';wrap.style.transformOrigin='';return;}
  wrap.style.transform='none';
  requestAnimationFrame(()=>{const headH=document.querySelector('header').offsetHeight;
    const availH=window.innerHeight-headH-16,availW=window.innerWidth-2,ch=wrap.scrollHeight,cw=wrap.scrollWidth;
    if(ch<=0)return;const s=Math.min(1,availH/ch,availW/cw);
    wrap.style.transformOrigin='top center';wrap.style.transform='scale('+s.toFixed(4)+')';});}
window.addEventListener('resize',fitTV);

/* TV / fullscreen */
const tvBtn=document.getElementById('tvBtn');
const isFs=()=>!!(document.fullscreenElement||document.webkitFullscreenElement);
async function enterTV(){document.body.classList.add('tv');
  try{const el=document.documentElement;if(el.requestFullscreen)await el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}catch(e){}
  setTimeout(fitTV,120);}
tvBtn.addEventListener('click',enterTV);
document.addEventListener('fullscreenchange',()=>{if(!isFs())document.body.classList.remove('tv');setTimeout(fitTV,120);});
document.addEventListener('webkitfullscreenchange',()=>{if(!isFs())document.body.classList.remove('tv');setTimeout(fitTV,120);});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.body.classList.contains('tv')&&!isFs()){document.body.classList.remove('tv');fitTV();}});
// auto TV via ?tv=1
if(new URLSearchParams(location.search).get('tv')==='1'){document.body.classList.add('tv');setTimeout(fitTV,200);}

/* clock */
function tick(){const n=new Date();
  document.getElementById('clockT').textContent=n.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('clockD').textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}
tick();setInterval(tick,1000);
const setDot=(id,on)=>{document.getElementById(id).className='dot '+(on?'on':'off');};

/* listeners — DOCK (read-only) */
let dockSeen=false;
['ING-3','ING-4'].forEach(key=>{const p=BLD[key].paths;
  onValue(ref(dockDb,p.dock),s=>{const v=s.val();S[key].orders=(v&&v.orders)?v.orders:[];dockSeen=true;setDot('dotDock',true);scheduleRender();},e=>{setDot('dotDock',false);});
  onValue(ref(dockDb,p.goal),s=>{S[key].goal=s.val()||{};scheduleRender();});
  onValue(ref(dockDb,p.rel),s=>{S[key].released=s.val()||[];scheduleRender();});
  onValue(query(ref(dockDb,p.hist),orderByKey(),limitToLast(20)),s=>{S[key].hist=s.val()||{};scheduleRender();});
});

/* listeners — OPS (read-only): ING-3 = shifts/ , ING-4 = ing4/shifts/ */
const OPS_PREFIX={'ING-3':'shifts/','ING-4':'ing4/shifts/'};
const opsRaw={'ING-3':{inbound:null,outbound:null,inventory:null},'ING-4':{inbound:null,outbound:null,inventory:null}};
function lastTwo(o){if(!o)return{cur:null,prev:null,cd:'',pd:''};const ks=Object.keys(o).sort();const c=ks[ks.length-1],p=ks[ks.length-2];return{cur:o[c]||null,prev:p?o[p]:null,cd:c||'',pd:p||''};}
function recomputeOps(key){const o=opsRaw[key];const ib=lastTwo(o.inbound),ob=lastTwo(o.outbound),iv=lastTwo(o.inventory);
  S[key].ops={ib:deriveIB(ib.cur),ibPrev:deriveIB(ib.prev),ibDate:ib.cd,ob:deriveOB(ob.cur),obPrev:deriveOB(ob.prev),obDate:ob.cd,inv:deriveINV(iv.cur),invDate:iv.cd};scheduleRender();}
['ING-3','ING-4'].forEach(key=>{['inbound','outbound','inventory'].forEach(area=>{
  onValue(query(ref(opsDb,OPS_PREFIX[key]+area),orderByKey(),limitToLast(6)),
    s=>{opsRaw[key][area]=s.val()||{};setDot('dotOps',true);recomputeOps(key);},
    e=>{recomputeOps(key);});
});});

render();
setTimeout(()=>{if(!dockSeen)setDot('dotDock',false);},6000);
</script>
</body>
</html>
